<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polling App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
  .container {
      background: white; padding: 40px; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%;
    }
    h1 { margin-bottom: 30px; color: #333; text-align: center; font-size: 24px; }
  .option {
      margin: 15px 0; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px;
      cursor: pointer; transition: 0.3s; display: flex; align-items: center;
    }
  .option:hover { border-color: #667eea; background: #f8f9ff; }
  .option.selected { border-color: #667eea; background: #f8f9ff; }
  .option input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
  .option label { cursor: pointer; font-size: 16px; flex: 1; }
    button {
      width: 100%; padding: 15px; margin-top: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px; font-size: 18px;
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn-secondary { background: #f0f0f0; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }
  .result-bar { margin: 20px 0; }
  .result-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
  .bar-bg { background: #e0e0e0; height: 30px; border-radius: 15px; overflow: hidden; }
  .bar-fill {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 100%;
      transition: width 0.5s ease; border-radius: 15px; display: flex;
      align-items: center; justify-content: flex-end; padding-right: 10px;
      color: white; font-size: 12px; font-weight: bold;
    }
  .total { text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; color: #667eea; }
  .loading { text-align: center; font-size: 20px; color: #667eea; }
  .error { text-align: center; color: #e74c3c; font-size: 16px; }
  .status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
  .status.success { color: #10b981; }
  .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"><div class="loading">Loading...</div></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:5000';
    const POLL_ID = '6a2c05cc0300181c72f0eab2b';
    let selectedOption = '';
    let hasVoted = localStorage.getItem('hasVoted_' + POLL_ID) === 'true';

    window.onload = () => fetchPoll();

    async function fetchPoll() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/poll/${POLL_ID}`);
        if (!res.ok) throw new Error('Failed to fetch');
        const poll = await res.json();
        renderPoll(poll);
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="error">Unable to connect to server.</div>`;
      }
    }

    function renderPoll(poll) {
      const totalVotes = poll.options.reduce((sum, opt) => sum + opt.votes, 0);
      if (!hasVoted) {
        document.getElementById('app').innerHTML = `
          <h1>🔥 ${poll.question}</h1>
          <div id="vote-section">
            ${poll.options.map((opt, idx) => `
              <div class="option" onclick="selectOption('${opt.text}', ${idx})">
                <input type="radio" name="poll" id="opt${idx}" value="${opt.text}">
                <label for="opt${idx}">${opt.text}</label>
              </div>
            `).join('')}
            <button id="voteBtn" onclick="submitVote()">Vote Now</button>
          </div>
        `;
      } else {
        document.getElementById('app').innerHTML = `
          <h1>🔥 ${poll.question}</h1>
          <div class="result-section">
            <h3>Results:</h3>
            ${poll.options.map(opt => {
              const percent = totalVotes > 0? ((opt.votes / totalVotes) * 100).toFixed(1) : 0;
              return `
                <div class="result-bar">
                  <div class="result-label"><span>${opt.text}</span><span>${opt.votes} votes - ${percent}%</span></div>
                  <div class="bar-bg"><div class="bar-fill" style="width: ${percent}%">${percent > 5? percent + '%' : ''}</div></div>
                </div>
              `;
            }).join('')}
            <p class="total">Total Votes: ${totalVotes}</p>
            <div class="btn-row">
              <button class="btn-secondary" onclick="resetVote()">Vote Again</button>
              <button onclick="backupData()">📥 Backup Data</button>
            </div>
          </div>
        `;
      }
    }

    function selectOption(option, idx) {
      selectedOption = option;
      document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
      document.querySelectorAll('.option')[idx].classList.add('selected');
      document.querySelectorAll('input[name="poll"]').forEach(input => {
        input.checked = input.value === option;
      });
    }

    async function submitVote() {
      // POPUP MESSAGE
      if (!selectedOption) {
        alert("select any language");
        return;
      }

      document.getElementById('voteBtn').disabled = true;
      document.getElementById('voteBtn').textContent = 'Submitting...';

      try {
        const res = await fetch(`${BACKEND_URL}/api/vote`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pollId: POLL_ID, option: selectedOption })
        });
        if (!res.ok) throw new Error('Vote failed');
        const data = await res.json();
        hasVoted = true;
        localStorage.setItem('hasVoted_' + POLL_ID, 'true');
        renderPoll(data.poll);
        showStatus('Vote submitted successfully!', 'success');
      } catch (err) {
        showStatus('Failed to submit vote', 'error');
        document.getElementById('voteBtn').disabled = false;
        document.getElementById('voteBtn').textContent = 'Vote Now';
      }
    }

    function resetVote() {
      hasVoted = false; selectedOption = '';
      localStorage.removeItem('hasVoted_' + POLL_ID);
      fetchPoll();
      showStatus('You can vote again', 'success');
    }

    async function backupData() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/backup`);
        const data = await res.json();
        const dataBlob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url; link.download = `poll-backup-${Date.now()}.json`; link.click();
        URL.revokeObjectURL(url);
        showStatus('Backup downloaded!', 'success');
      } catch (error) {
        showStatus('Backup failed', 'error');
      }
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
      setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, 3000);
    }
  </script>
</body>
</html>
